<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faeee7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Vinyl Record Container */
        .vinyl-container {
            position: relative;
            margin-bottom: 60px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Outer vinyl disc */
        .vinyl-disc {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: #33272a;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .vinyl-disc.spinning {
            animation: spin 30s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Vinyl grooves effect */
        .vinyl-grooves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                circle at center,
                transparent 0px,
                transparent 2px,
                rgba(255, 255, 255, 0.03) 2px,
                rgba(255, 255, 255, 0.03) 4px
            );
        }

        /* Photo in center (label area) */
        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #faeee7;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .vinyl-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Center hole */
        .center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #faeee7;
            border: 3px solid #33272a;
            z-index: 10;
        }

        /* Now Playing Text */
        .now-playing {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1.5s ease;
        }

        .now-playing h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.8em;
            color: #33272a;
            margin-bottom: 10px;
        }

        .now-playing p {
            font-size: 1.2em;
            color: #594a4e;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .play-pause-btn {
            background: #ff8ba7;
            border: 3px solid #33272a;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px #ffc6c7;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .play-pause-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #ffc6c7;
            background: #ffc6c7;
        }

        .play-pause-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #ffc6c7;
        }

        /* Play icon (triangle) */
        .play-icon {
            width: 0;
            height: 0;
            border-left: 20px solid #33272a;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        /* Pause icon (two bars) */
        .pause-icon {
            display: none;
            gap: 6px;
        }

        .pause-icon .bar {
            width: 6px;
            height: 24px;
            background: #33272a;
            border-radius: 2px;
        }

        .play-pause-btn.playing .play-icon {
            display: none;
        }

        .play-pause-btn.playing .pause-icon {
            display: flex;
        }

        /* Coming Soon Message */
        .coming-soon {
            text-align: center;
            margin-top: 20px;
            animation: fadeIn 2s ease;
        }

        .coming-soon h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.5em;
            color: #33272a;
            margin-bottom: 10px;
        }

        .coming-soon p {
            font-size: 1.1em;
            color: #594a4e;
        }

        /* Archive Link (subtle) */
        .archive-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fffffe;
            color: #33272a;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px solid #33272a;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 3px 3px 0px #ffc6c7;
        }

        .archive-link:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #ffc6c7;
            background: #ffc6c7;
        }

        @media (max-width: 768px) {
            .vinyl-disc {
                width: 280px;
                height: 280px;
            }

            .vinyl-label {
                width: 160px;
                height: 160px;
            }

            .center-hole {
                width: 35px;
                height: 35px;
            }

            .now-playing h2 {
                font-size: 1.4em;
            }

            .play-pause-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5em;
            }

            .archive-link {
                position: static;
                margin-top: 30px;
                display: inline-block;
            }
        }
    </style>
</head>
<body>
    <!-- Archive Link -->
    <a href="archive.html" class="archive-link">Archive</a>

    <!-- Vinyl Container -->
    <div class="vinyl-container">
        <div class="vinyl-disc" id="vinylDisc">
            <div class="vinyl-grooves"></div>
            <div class="vinyl-label">
                <img src="cardAssets/us.jpg" alt="Us" id="vinylPhoto">
            </div>
            <!-- <div class="center-hole"></div> -->
        </div>
    </div>

    <!-- Now Playing -->
    <div class="now-playing">
        <h2>Now Playing</h2>
        <p>Daft Punk - Something About Us</p>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="play-pause-btn" id="playPauseBtn" aria-label="Play/Pause">
            <div class="play-icon"></div>
            <div class="pause-icon">
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </button>
    </div>

    <!-- Coming Soon -->
    <div class="coming-soon">
        <h3>Something coming soon...</h3>
    </div>

    <!-- Audio Element -->
    <audio id="audio" loop>
        <source src="audio/something_about_us.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const vinylDisc = document.getElementById('vinylDisc');
        let isPlaying = false;

        // Auto-play on load (with fallback for browsers that block autoplay)
        window.addEventListener('load', () => {
            audio.play().then(() => {
                isPlaying = true;
                vinylDisc.classList.add('spinning');
                playPauseBtn.classList.add('playing');
            }).catch(() => {
                // Autoplay was blocked, user needs to click play
                console.log('Autoplay blocked - user must click play');
            });
        });

        // Play/Pause toggle
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                vinylDisc.classList.remove('spinning');
                playPauseBtn.classList.remove('playing');
                isPlaying = false;
            } else {
                audio.play();
                vinylDisc.classList.add('spinning');
                playPauseBtn.classList.add('playing');
                isPlaying = true;
            }
        });

        // Sync button state if audio ends (shouldn't happen with loop, but just in case)
        audio.addEventListener('ended', () => {
            vinylDisc.classList.remove('spinning');
            playPauseBtn.classList.remove('playing');
            isPlaying = false;
        });
    </script>
</body>
</html>
